name: Deploy app engine docker image to AWS ECR

on:
    push:
        branches:
            - master
        paths:
            - 'app/dispatcher/**'

permissions:
    id-token: write
    contents: read
    pull-requests: write
    issues: write

jobs:
    build-and-deploy:
        name: Build and Push Docker Image to ECR
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::916194680580:role/Zeteon_GitHub_Actions_Role
                aws-region: us-east-1
            
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Restore token.pickle
              run: |
                    mkdir -p app/dispatcher

                    echo "$CREDENTIALS_JSON_B64" | base64 -d > app/dispatcher/credentials.json
                    echo "$CLIENT_SECRET_JSON_B64" | base64 -d > app/dispatcher/client_secret.json
                    echo "$TOKEN_PICKLE_B64" | base64 -d > app/dispatcher/token.pickle
                    env:
                        CREDENTIALS_JSON_B64: ${{ secrets.DISPATCHER_CREDENTIALS_JSON_B64 }}
                        CLIENT_SECRET_JSON_B64: ${{ secrets.DISPATCHER_CLIENT_SECRETS_JSON_B64 }}
                        TOKEN_PICKLE_B64: ${{ secrets.DISPATCHER_TOKEN_PICKLE_B64 }}

            - name: Build, Tag, and Push Docker Image
              run: |
                # Build the Docker image
                docker buildx build --platform linux/amd64 --provenance=false --output type=docker -t zeteon-dispatcher ./app/dispatcher


                # Tag the image with the ECR registry
                docker tag zeteon-dispatcher:latest ${{ steps.login-ecr.outputs.registry }}/zeteon-dispatcher:latest

                # Push the image to ECR
                docker push ${{ steps.login-ecr.outputs.registry }}/zeteon-dispatcher:latest

