name: "Terraform Apply"

on:
  push:
    branches: [ master ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_VAR_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      TF_VAR_CHAT_ID: ${{ secrets.CHAT_ID }}
      TF_VAR_ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
      TF_VAR_ECS_SUBNET_ID: ${{ secrets.SUBNET_ID }}
      TF_VAR_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    defaults:
      run:
        working-directory: ./infra/live/app_services

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Find the PR that triggered this merge
      - name: Find Current Pull Request
        uses: jwalton/gh-find-current-pr@v1
        id: findPr
        with:
          state: all

      # 2. Inform PR that Apply is starting
      - name: Inform on PR
        if: steps.findPr.outputs.number
        uses: mshick/add-pr-comment@v1
        with:
          repo-token: ${{ secrets.CUSTOM_PAT }}
          issue-number: ${{ steps.findPr.outputs.number }}
          message: |
            🚀 **Terraform Apply is starting** on merge to master...

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::916194680580:role/Zeteon_GitHub_Actions_Role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        id: apply
        continue-on-error: true
        run: |
          terraform apply -auto-approve -input=false 2>&1 | tee apply.txt

      # 3. Post Results back to the found PR
      - name: Post Result to PR
        if: steps.findPr.outputs.number
        uses: mshick/add-pr-comment@v1
        with:
          repo-token: ${{ secrets.CUSTOM_PAT }}
          issue-number: ${{ steps.findPr.outputs.number }}
          message: |
            ${{ steps.apply.outcome == 'success' && '✅ **Terraform Apply Succeeded**' || '❌ **Terraform Apply Failed**' }}
            
            <details><summary>Show Apply Output</summary>
            
            ```
            ${{ steps.apply.outputs.stdout }}
            ```
            </details>