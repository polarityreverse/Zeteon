name: "Terraform Plan"

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/live/app_services
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::916194680580:role/Zeteon_GitHub_Actions_Role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate --no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan && terraform show -no-color tfplan
        env:
          TF_VAR_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TF_VAR_CHAT_ID: ${{ secrets.CHAT_ID }}
          TF_VAR_ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
          TF_VAR_ECS_SUBNET_ID: ${{ secrets.ECS_SUBNET_ID }}
          TF_VAR_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}