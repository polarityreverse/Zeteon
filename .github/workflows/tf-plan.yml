name: "Terraform Plan"

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::916194680580:role/Zeteon_GitHub_Actions_Role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Plan
        working-directory: ./infra/live/app_services
        run: |
          terraform init
          terraform plan -no-color
        env:
          TF_VAR_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TF_VAR_CHAT_ID: ${{ secrets.CHAT_ID }}
          TF_VAR_ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
          TF_VAR_ECS_SUBNET_ID: ${{ secrets.ECS_SUBNET_ID }}
          TF_VAR_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}