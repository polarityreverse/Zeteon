name: "Terraform Plan"

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      TF_VAR_CHAT_ID: ${{ secrets.CHAT_ID }}
      TF_VAR_ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP }}
      TF_VAR_ECS_SUBNET_ID: ${{ secrets.ECS_SUBNET_ID }}
      TF_VAR_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    defaults:
      run:
        working-directory: ./infra/live/app_services

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::916194680580:role/Zeteon_GitHub_Actions_Role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -recursive -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: |
          terraform validate -no-color 2>&1 > validate.txt || true
          # Using GITHUB_OUTPUT instead of GITHUB_ENV to satisfy the VS Code Linter
          echo "validate_log<<EOF" >> $GITHUB_OUTPUT
          cat validate.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan > plan_raw.txt 2>&1 || true
          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan_final.txt 2>&1 || true
          else
            cp plan_raw.txt plan_final.txt
          fi
          echo "plan_log<<EOF" >> $GITHUB_OUTPUT
          cat plan_final.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const planLog = `${{ steps.plan.outputs.plan_log }}` || "No plan captured.";
            const valLog = `${{ steps.validate.outputs.validate_log }}` || "No validation captured.";
            
            const pStatus = "${{ steps.plan.outcome }}" === "success" ? "✅" : "❌";
            const fStatus = "${{ steps.fmt.outcome }}" === "success" ? "✅" : "❌";
            
            const body = `### Terraform Plan Results 🚀
            - **Format:** ${fStatus} \`${{ steps.fmt.outcome }}\`
            - **Plan:** ${pStatus} \`${{ steps.plan.outcome }}\`

            #### Validation Details 🤖
            <details><summary>Expand</summary>

            \`\`\`text
            ${valLog}
            \`\`\`

            </details>

            #### Plan Details 📖
            <details><summary>Expand</summary>

            \`\`\`terraform
            ${planLog.replace(/\$\{/g, '\\${')}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Final Check
        if: steps.plan.outcome == 'failure' || steps.fmt.outcome == 'failure'
        run: exit 1